spring.application.name=E-commerceBackend
# Server
server.port=8080


# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/E-commerce_db
spring.datasource.username=postgres
spring.datasource.password=admin12345
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
# This tells Spring to create the table if it doesn't exist
spring.jpa.hibernate.ddl-auto=update

# This helps in seeing the actual SQL in the console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# JWT
jwt.secret=yourSecretKeyGoesHereMakeItLongAndComplexAtLeast64Chars
jwt.expiration=86400000


admin.secret=VV@@##$$123


# ✅ Allow large request bodies (for Base64 images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=100MB
